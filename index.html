<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Bee Timer</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif; 
            background-color: #f0f9ff;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        h1 { 
            font-size: clamp(1.5rem, 8vw, 2.5rem); 
            color: #2e7d32;
            margin-bottom: 10px;
            text-align: center;
        }

        /* Responsive Container */
        .timer-container {
            position: relative;
            /* Using vmin makes it scale perfectly on mobile and desktop */
            width: 80vmin;
            height: 80vmin;
            max-width: 400px;
            max-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bee-path {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px dashed #c8e6c9;
            border-radius: 50%;
            box-sizing: border-box;
        }

        .flower {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(2rem, 10vw, 3.5rem);
            z-index: 5;
        }

        #bee-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transition: transform 1s linear;
            z-index: 10;
        }

        #bee {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(2rem, 10vw, 3rem);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .happy-wiggle {
            animation: wiggle 0.3s ease-in-out infinite;
        }

        @keyframes wiggle {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-15px); }
        }

        .timer-display {
            font-size: clamp(2.5rem, 12vw, 4.5rem);
            font-weight: 900;
            color: #1b5e20;
            z-index: 2;
            font-variant-numeric: tabular-nums;
        }

        /* Button Grid for Mobile */
        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 400px;
        }

        .custom-input, .action-btns {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 400px;
            justify-content: center;
        }

        button {
            padding: 12px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            background: #ffc107;
            color: #333;
            font-weight: bold;
            box-shadow: 0 4px 0 #ffa000;
            flex: 1;
        }

        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #ffa000; }

        input {
            padding: 12px;
            font-size: 1rem;
            border-radius: 12px;
            border: 2px solid #ffc107;
            width: 80px;
            text-align: center;
        }

        .stop-btn { background: #cfd8dc; box-shadow: 0 4px 0 #b0bec5; }
    </style>
</head>
<body>

    <h1>Bee Busy!</h1>

    <div class="timer-container">
        <div class="flower">🌸</div>
        <div class="bee-path"></div>
        <div id="bee-wrapper">
            <div id="bee">🐝</div>
        </div>
        <div id="display" class="timer-display">00:00</div>
    </div>

    <div class="controls">
        <button onclick="setTime(1)">1 Min</button>
        <button onclick="setTime(5)">5 Min</button>
        <button onclick="setTime(10)">10 Min</button>
        <button onclick="setTime(15)">15 Min</button>
    </div>

    <div class="custom-input">
        <input type="number" id="customMin" placeholder="Mins">
        <button onclick="setCustomTime()">Set</button>
    </div>

    <div class="action-btns">
        <button class="stop-btn" onclick="resetTimer()">Reset</button>
    </div>

    <script>
        let countdown;
        let timeLeft;
        let totalTimeSet;
        const display = document.getElementById('display');
        const beeWrapper = document.getElementById('bee-wrapper');
        const bee = document.getElementById('bee');

        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playEndSound() {
            initAudio();
            // Longer Buzzing Sequence
            const buzzRounds = 6; 
            for (let i = 0; i < buzzRounds; i++) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sawtooth';
                // Oscillating frequency for a real "bzz" feel
                osc.frequency.setValueAtTime(180, audioCtx.currentTime + (i * 0.5));
                osc.frequency.linearRampToValueAtTime(220, audioCtx.currentTime + (i * 0.5) + 0.2);
                
                gain.gain.setValueAtTime(0, audioCtx.currentTime + (i * 0.5));
                gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + (i * 0.5) + 0.05);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + (i * 0.5) + 0.4);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(audioCtx.currentTime + (i * 0.5));
                osc.stop(audioCtx.currentTime + (i * 0.5) + 0.4);
            }
        }

        function updateDisplay(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            display.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            
            if (totalTimeSet > 0) {
                const angle = ((totalTimeSet - seconds) / totalTimeSet) * 360;
                // Rotate the wrapper so the bee follows the circle edge
                beeWrapper.style.transform = `rotate(${angle}deg)`;
            }
        }

        function setTime(mins) {
            initAudio();
            resetTimer();
            totalTimeSet = mins * 60;
            timeLeft = totalTimeSet;
            updateDisplay(timeLeft);
            startTimer();
        }

        function setCustomTime() {
            const val = document.getElementById('customMin').value;
            if (val > 0) setTime(val);
        }

        function startTimer() {
            clearInterval(countdown);
            countdown = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    updateDisplay(0);
                    clearInterval(countdown);
                    timerFinished();
                } else {
                    updateDisplay(timeLeft);
                }
            }, 1000);
        }

        function timerFinished() {
            bee.classList.add('happy-wiggle');
            display.textContent = "DONE!";
            playEndSound();
        }

        function resetTimer() {
            clearInterval(countdown);
            bee.classList.remove('happy-wiggle');
            beeWrapper.style.transform = `rotate(0deg)`;
            updateDisplay(0);
        }
    </script>
</body>
</html>
