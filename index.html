<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bee to Flower Timer</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif; 
            background-color: #f0f9ff;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 { 
            font-size: 2.5rem; 
            color: #2e7d32;
            margin-bottom: 20px;
        }

        .timer-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bee-path {
            position: absolute;
            width: 300px;
            height: 300px;
            border: 6px dashed #c8e6c9;
            border-radius: 50%;
            box-sizing: border-box;
        }

        .flower {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3.5rem;
            z-index: 5;
        }

        #bee {
            position: absolute;
            font-size: 3rem;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            /* This is the magic part: it centers the bee on the path */
            left: 120px; 
            top: -30px; 
            /* The pivot is exactly 150px down from the top-center of the bee */
            transform-origin: 30px 180px; 
            z-index: 10;
            transform: rotate(0deg);
        }

        .happy-wiggle {
            animation: wiggle 0.2s ease-in-out infinite;
        }

        @keyframes wiggle {
            0% { transform: rotate(360deg) translate(0, 0); }
            50% { transform: rotate(360deg) translate(0, -10px); }
            100% { transform: rotate(360deg) translate(0, 0); }
        }

        .timer-display {
            font-size: 4.5rem;
            font-weight: 900;
            color: #1b5e20;
            z-index: 2;
            font-variant-numeric: tabular-nums;
        }

        .controls, .custom-input, .action-btns {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 20px;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            background: #ffc107;
            color: #333;
            font-weight: bold;
            box-shadow: 0 4px 0 #ffa000;
        }

        button:hover { background: #ffca28; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #ffa000; }

        input {
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 12px;
            border: 2px solid #ffc107;
            width: 70px;
            text-align: center;
        }

        .stop-btn { background: #cfd8dc; box-shadow: 0 4px 0 #b0bec5; }
    </style>
</head>
<body>

    <h1>Bee Happy!</h1>

    <div class="timer-container">
        <div class="flower">🌸</div>
        <div class="bee-path"></div>
        <div id="bee">🐝</div>
        <div id="display" class="timer-display">00:00</div>
    </div>

    <div class="controls">
        <button onclick="setTime(1)">1 Min</button>
        <button onclick="setTime(5)">5 Min</button>
        <button onclick="setTime(10)">10 Min</button>
        <button onclick="setTime(15)">15 Min</button>
    </div>

    <div class="custom-input">
        <input type="number" id="customMin" placeholder="0">
        <button onclick="setCustomTime()">Set Custom</button>
    </div>

    <div class="action-btns">
        <button class="stop-btn" onclick="resetTimer()">Reset</button>
    </div>

    <script>
        let countdown;
        let timeLeft;
        let totalTimeSet;
        const display = document.getElementById('display');
        const bee = document.getElementById('bee');

        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playEndSound() {
            initAudio();
            const duration = 2.0; 
            const startTime = audioCtx.currentTime;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const lfo = audioCtx.createOscillator();
            const lfoGain = audioCtx.createGain();
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(85, startTime); 
            osc.frequency.exponentialRampToValueAtTime(65, startTime + duration);

            lfo.frequency.setValueAtTime(12, startTime); 
            lfoGain.gain.setValueAtTime(0.06, startTime); 
            
            lfo.connect(lfoGain);
            lfoGain.connect(gain.gain); 

            gain.gain.setValueAtTime(0.2, startTime);
            gain.gain.linearRampToValueAtTime(0, startTime + duration);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            lfo.start();
            osc.stop(startTime + duration);
            lfo.stop(startTime + duration);
        }

        function updateDisplay(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            display.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function setTime(mins) {
            initAudio();
            resetTimer();
            totalTimeSet = mins * 60;
            timeLeft = totalTimeSet;
            
            updateDisplay(timeLeft);
            
            // Set smooth transition for the bee's flight
            setTimeout(() => {
                bee.style.transition = `transform ${totalTimeSet}s linear`;
                bee.style.transform = `rotate(360deg)`;
            }, 50);

            startTimer();
        }

        function setCustomTime() {
            const val = document.getElementById('customMin').value;
            if (val > 0) setTime(val);
        }

        function startTimer() {
            clearInterval(countdown);
            countdown = setInterval(() => {
                timeLeft--;
                updateDisplay(timeLeft);
                
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    timerFinished();
                }
            }, 1000);
        }

        function timerFinished() {
            bee.style.transition = 'none';
            bee.style.transform = `rotate(360deg)`;
            bee.classList.add('happy-wiggle');
            display.textContent = "DONE!";
            playEndSound();
        }

        function resetTimer() {
            clearInterval(countdown);
            bee.classList.remove('happy-wiggle');
            bee.style.transition = 'none';
            bee.style.transform = `rotate(0deg)`;
            updateDisplay(0);
        }
    </script>
</body>
</html>
