<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friendly Bee Timer</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif; 
            background-color: #f0f9ff; /* Soft sky blue */
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 { 
            font-size: 2.5rem; 
            color: #2e7d32; /* Garden green */
            margin-bottom: 40px;
        }

        /* The circular path for the bee */
        .timer-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bee-path {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 8px dashed #c8e6c9;
            border-radius: 50%;
        }

        #bee {
            position: absolute;
            font-size: 3rem;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Move pivot point to center of circle */
            transform-origin: 150px 150px; 
            left: 0;
            top: 0;
            transition: transform 1s linear;
        }

        /* Gentle wiggle animation for the end */
        .happy-wiggle {
            animation: wiggle 0.5s ease-in-out infinite;
        }

        @keyframes wiggle {
            0% { transform: rotate(var(--final-angle)) translate(0, 0); }
            50% { transform: rotate(var(--final-angle)) translate(5px, -5px); }
            100% { transform: rotate(var(--final-angle)) translate(0, 0); }
        }

        .timer-display {
            font-size: 4rem;
            font-weight: 900;
            color: #1b5e20;
            z-index: 10;
            font-variant-numeric: tabular-nums;
        }

        .finished-glow {
            color: #4caf50;
            text-shadow: 0 0 20px #81c784;
        }

        .controls, .custom-input, .action-btns {
            margin-top: 25px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 20px;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            background: #ffc107; /* Honey yellow */
            color: #333;
            font-weight: bold;
            box-shadow: 0 4px 0 #ffa000;
        }

        button:hover { background: #ffca28; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #ffa000; }

        input {
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 12px;
            border: 2px solid #ffc107;
            width: 70px;
            text-align: center;
        }

        .stop-btn { background: #cfd8dc; box-shadow: 0 4px 0 #b0bec5; }
    </style>
</head>
<body>

    <h1>Bee Busy!</h1>

    <div class="timer-container">
        <div class="bee-path"></div>
        <div id="bee">🐝</div>
        <div id="display" class="timer-display">00:00</div>
    </div>

    <div class="controls">
        <button onclick="setTime(1)">1 Min</button>
        <button onclick="setTime(5)">5 Min</button>
        <button onclick="setTime(10)">10 Min</button>
        <button onclick="setTime(15)">15 Min</button>
    </div>

    <div class="custom-input">
        <input type="number" id="customMin" placeholder="0">
        <button onclick="setCustomTime()">Set Custom</button>
    </div>

    <div class="action-btns">
        <button class="stop-btn" onclick="resetTimer()">Reset</button>
    </div>

    <script>
        let countdown;
        let timeLeft;
        let totalTimeSet;
        const display = document.getElementById('display');
        const bee = document.getElementById('bee');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playEndSound() {
            // Soft chime sound
            const notes = [523.25, 659.25, 783.99]; 
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine'; // Pure, soft tone
                osc.frequency.value = freq;
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.5);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + (i * 0.3));
                osc.stop(audioCtx.currentTime + (i * 0.3) + 1);
            });
        }

        function updateDisplay(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            display.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            
            // Move bee in a circle (360 degrees)
            if (totalTimeSet > 0) {
                const angle = ((totalTimeSet - seconds) / totalTimeSet) * 360;
                bee.style.transform = `rotate(${angle}deg)`;
                // Store angle for the wiggle animation later
                bee.style.setProperty('--final-angle', `${angle}deg`);
            }
        }

        function setTime(mins) {
            resetTimer();
            totalTimeSet = mins * 60;
            timeLeft = totalTimeSet;
            updateDisplay(timeLeft);
            startTimer();
        }

        function setCustomTime() {
            const val = document.getElementById('customMin').value;
            if (val > 0) setTime(val);
        }

        function startTimer() {
            clearInterval(countdown);
            countdown = setInterval(() => {
                timeLeft--;
                updateDisplay(timeLeft);
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    timerFinished();
                }
            }, 1000);
        }

        function timerFinished() {
            display.classList.add('finished-glow');
            bee.classList.add('happy-wiggle');
            display.textContent = "Bzzz!";
            playEndSound();
        }

        function resetTimer() {
            clearInterval(countdown);
            display.classList.remove('finished-glow');
            bee.classList.remove('happy-wiggle');
            bee.style.transform = `rotate(0deg)`;
            updateDisplay(0);
        }
    </script>
</body>
</html>
