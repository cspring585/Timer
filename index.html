<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Read Space Timer</title>
    <style>
        body {
            /* Using standard clear fonts that are easy to read */
            font-family: Arial, Helvetica, sans-serif; 
            background-color: #0b1a30;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-color 0.5s;
        }

        h1 { 
            font-size: 2.5rem; 
            margin-top: 20px; 
            color: #ffeb3b;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #launch-path {
            position: relative;
            width: 80px;
            height: 45vh;
            background: rgba(255,255,255,0.1);
            border-radius: 40px;
            margin: 20px 0;
            border: 4px solid #ffffff;
        }

        #rocket {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3.5rem;
            transition: bottom 1s linear;
        }

        #rocket.launching::after {
            content: '🔥';
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            animation: flicker 0.1s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.8; transform: translateX(-50%) scaleY(1); }
            100% { opacity: 1; transform: translateX(-50%) scaleY(1.1); }
        }

        .timer-display {
            font-size: 6rem;
            font-weight: 900; /* Extra bold for clarity */
            margin: 10px;
            padding: 15px 40px;
            background: #1a1a1a;
            border: 4px solid #61dafb;
            border-radius: 15px;
            z-index: 10;
            font-variant-numeric: tabular-nums; /* Keeps numbers from jumping */
        }

        .finished { 
            animation: party 0.2s infinite; 
        }

        @keyframes party {
            0% { background-color: #ff0000; }
            50% { background-color: #0000ff; }
            100% { background-color: #00ff00; }
        }

        .controls, .custom-input, .action-btns {
            z-index: 10;
            margin-top: 15px;
        }

        button {
            padding: 12px 24px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #4caf50;
            color: white;
            font-weight: bold;
            margin: 5px;
        }

        button:hover { background: #66bb6a; }

        input {
            padding: 12px;
            font-size: 1.2rem;
            border-radius: 8px;
            border: 2px solid #fff;
            width: 80px;
            text-align: center;
        }

        .stop-btn { background: #f44336; }
    </style>
</head>
<body id="bg">

    <h1>Mission Countdown</h1>

    <div id="launch-path">
        <div id="rocket">🚀</div>
    </div>

    <div id="display" class="timer-display">00:00</div>

    <div class="controls">
        <button onclick="setTime(1)">1 Min</button>
        <button onclick="setTime(5)">5 Min</button>
        <button onclick="setTime(10)">10 Min</button>
        <button onclick="setTime(15)">15 Min</button>
    </div>

    <div class="custom-input">
        <input type="number" id="customMin" placeholder="0">
        <button onclick="setCustomTime()">Set Custom</button>
    </div>

    <div class="action-btns">
        <button class="stop-btn" onclick="resetTimer()">Reset Timer</button>
    </div>

    <script>
        let countdown;
        let timeLeft;
        let totalTimeSet;
        const display = document.getElementById('display');
        const body = document.getElementById('bg');
        const rocket = document.getElementById('rocket');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playEndSound() {
            const notes = [523.25, 659.25, 783.99, 1046.50]; 
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = freq;
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + i + 1);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + (i * 0.2));
                osc.stop(audioCtx.currentTime + (i * 0.2) + 0.5);
            });
        }

        function updateDisplay(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            display.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            const progress = totalTimeSet > 0 ? ((totalTimeSet - seconds) / totalTimeSet) * 100 : 0;
            rocket.style.bottom = `${progress}%`;
        }

        function setTime(mins) {
            resetTimer();
            totalTimeSet = mins * 60;
            timeLeft = totalTimeSet;
            updateDisplay(timeLeft);
            startTimer();
        }

        function setCustomTime() {
            const val = document.getElementById('customMin').value;
            if (val > 0) setTime(val);
        }

        function startTimer() {
            clearInterval(countdown);
            rocket.classList.add('launching');
            countdown = setInterval(() => {
                timeLeft--;
                updateDisplay(timeLeft);
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    timerFinished();
                }
            }, 1000);
        }

        function timerFinished() {
            rocket.classList.remove('launching');
            rocket.style.bottom = '100%'; 
            body.classList.add('finished');
            display.textContent = "DONE!";
            playEndSound();
        }

        function resetTimer() {
            clearInterval(countdown);
            rocket.classList.remove('launching');
            body.classList.remove('finished');
            rocket.style.bottom = '0%'; 
            updateDisplay(0);
        }
    </script>
</body>
</html>
