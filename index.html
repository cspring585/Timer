<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Space Timer</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif; /* Friendly font */
            background-color: #0b1a30; /* Dark space background */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Space from the top */
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-color 0.5s;
        }

        h1 { font-size: 2.5rem; margin-top: 20px; color: #ffeb3b; }

        /* --- New Progress Bar and Rocket Styling --- */
        #launch-path {
            position: relative;
            width: 100px;
            height: 50vh; /* The distance the rocket travels */
            background: rgba(255,255,255,0.1);
            border-radius: 50px;
            margin: 20px 0;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        #rocket {
            position: absolute;
            bottom: 0; /* Start at bottom */
            left: 50%;
            transform: translateX(-50%);
            font-size: 4rem; /* Big rocket emoji */
            transition: bottom 1s linear; /* Smooth movement */
        }

        /* The flame effect when running */
        #rocket.launching::after {
            content: '🔥';
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            animation: flicker 0.1s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.8; transform: translateX(-50%) scaleY(1); }
            100% { opacity: 1; transform: translateX(-50%) scaleY(1.2); }
        }

        /* --- Timer Display & Controls --- */
        .timer-display {
            font-size: 5rem;
            font-weight: bold;
            margin: 10px;
            padding: 10px 30px;
            background: #282c34;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* Post-launch party animation */
        .finished { animation: party 0.2s infinite; }
        @keyframes party {
            0% { background-color: #ff0000; }
            25% { background-color: #00ff00; }
            50% { background-color: #0000ff; }
            100% { background-color: #ffff00; }
        }

        .controls, .custom-input, .action-btns {
            z-index: 10;
            margin-top: 15px;
        }

        button {
            padding: 10px 20px;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            background: #4caf50;
            color: white;
            font-weight: bold;
            transition: 0.2s;
            margin: 0 5px;
        }

        button:hover { background: #81c784; transform: scale(1.05); }
        button:active { transform: scale(0.95); }

        input {
            padding: 10px;
            font-size: 1.1rem;
            border-radius: 50px;
            border: 2px solid #fff;
            width: 70px;
            text-align: center;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .stop-btn { background: #f44336; }
        .stop-btn:hover { background: #e57373; }
    </style>
</head>
<body id="bg">

    <h1>Space Mission Countdown!</h1>

    <div id="launch-path">
        <div id="rocket">🚀</div>
    </div>

    <div id="display" class="timer-display">00:00</div>

    <div class="controls">
        <button onclick="setTime(1)">1 Min</button>
        <button onclick="setTime(5)">5 Min</button>
        <button onclick="setTime(10)">10 Min</button>
        <button onclick="setTime(15)">15 Min</button>
    </div>

    <div class="custom-input">
        <input type="number" id="customMin" placeholder="Mins">
        <button onclick="setCustomTime()">Set Custom</button>
    </div>

    <div class="action-btns">
        <button class="stop-btn" onclick="resetTimer()">Abort Mission</button>
    </div>

    <script>
        let countdown;
        let timeLeft;
        let totalTimeSet; // Needed to calculate progress
        const display = document.getElementById('display');
        const body = document.getElementById('bg');
        const rocket = document.getElementById('rocket');

        // Audio Setup (Still synthesis, still offline)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playEndSound() {
            // A slightly more "alien/spacey" melody
            const notes = [440, 554.37, 659.25, 880, 1046.50]; 
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth'; // Rougher, more fun sound
                osc.frequency.value = freq;
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + i + 1);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + (i * 0.15));
                osc.stop(audioCtx.currentTime + (i * 0.15) + 0.4);
            });
        }

        function updateDisplay(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            display.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

            // --- Update Rocket Position ---
            // Calculate how far up the rocket should be (0 to 100%)
            const progress = ((totalTimeSet - seconds) / totalTimeSet) * 100;
            // Apply that percentage to the 'bottom' CSS property
            rocket.style.bottom = `${progress}%`;
        }

        function setTime(mins) {
            resetTimer();
            totalTimeSet = mins * 60;
            timeLeft = totalTimeSet;
            updateDisplay(timeLeft);
            startTimer();
        }

        function setCustomTime() {
            const val = document.getElementById('customMin').value;
            if (val > 0) setTime(val);
        }

        function startTimer() {
            clearInterval(countdown);
            rocket.classList.add('launching'); // Start the flame animation
            
            countdown = setInterval(() => {
                timeLeft--;
                updateDisplay(timeLeft);

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    timerFinished();
                }
            }, 1000);
        }

        function timerFinished() {
            rocket.classList.remove('launching');
            // Keep rocket at the very top (100%)
            rocket.style.bottom = '100%'; 
            body.classList.add('finished');
            display.textContent = "LIFT OFF!";
            playEndSound();
        }

        function resetTimer() {
            clearInterval(countdown);
            rocket.classList.remove('launching');
            body.classList.remove('finished');
            // Reset rocket to the ground
            rocket.style.bottom = '0%'; 
            updateDisplay(0);
        }
    </script>
</body>
</html>
